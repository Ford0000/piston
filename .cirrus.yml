test_push_task:
  name: Run tests
  only_if: (${CIRRUS_PR} == '1' || ${CIRRUS_PR} == '2') && ${CIRRUS_PR_DRAFT} == 'false'
  execution_lock: only-one
  timeout_in: 600m
  on_timeout:
    cleanup_task: sleep 5m

  env:
    A: ENCRYPTED[0507f3f0599b8508df1f3bcb31f5af51fdcbe4dddbca3679536dd06b5f9d1d388101152e06ae24d06d127a713879d93c]
    B: ENCRYPTED[a3972e18997e4e422d207954ae84e6ea2d7129c9d9038bbf227c815e684963be52fe09bf57151a987bf763afaf1bccc9]
    C: ENCRYPTED[6f8b7d596f6110c1bd57290e058e8dcadc134a9c4cc026a24c22678906c3e58ec6471d1203f5de0297340f0e1ddaaf1b]
    D: ENCRYPTED[9b8b352711275c748f51ceca367a72b0fbbf6a2eb24440cd2215e566d1af16fe638c2520457f7eb86725307fb3efa5b4]
    E: ENCRYPTED[803a877c396edc539e7fdce1e39d7ddd94789908e97db0d3afa14edbc039d74e3bf5e17e7883aaa876ed8425a8acf70f]
    F: ENCRYPTED[7c3d91e86303974b03d71493559a0f69f92530cf02796584d9ddd70b0e52a1342877201550ab56165e051399e6725e3d]
    G: ENCRYPTED[e074338bc6aabd1c759c0448b21f7a1277dc06f3bef6604a2ce6b3bae7b04ae1284b14954ffc3032b959c87a0b565d2d]

  compute_engine_instance:
    image_project: debian-cloud
    image: family/debian-13
    architecture: amd64
    platform: linux
    nested_virtualization: false
    cpu: 8
    memory: 32G
    disk: 256

  clone_script: |
    export DEBIAN_FRONTEND=noninteractive
    apt-get update 1>/dev/null 2>&1
    apt-get -yq install git 1>/dev/null 2>&1
    git clone --recursive --branch=master "https://x-access-token:${CIRRUS_REPO_CLONE_TOKEN}@github.com/${CIRRUS_REPO_FULL_NAME}.git" "${CIRRUS_WORKING_DIR}"
    if [ -z "$CIRRUS_PR" ]; then
      git reset --hard "${CIRRUS_CHANGE_IN_REPO}"
    fi

  run_script: printf '%s' "${A}" | base64 -d | bash
